<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wind Speed Dashboard</title>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 30px;
    }

    .dashboard {
        background: #1e293b;
        padding: 20px;
        border-radius: 15px;
        width: 350px;
        margin: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .value {
        font-size: 30px;
        margin: 10px 0;
    }

    .label {
        font-size: 16px;
        color: #94a3b8;
    }

    .status {
        margin-top: 10px;
        padding: 8px;
        border-radius: 10px;
        font-weight: bold;
    }

    .safe { background: green; }
    .warning { background: orange; }
    .danger { background: red; }

    canvas {
        margin-top: 20px;
    }
</style>
</head>

<body>

<div class="dashboard">
    <h2>🌬 Wind Dashboard</h2>

    <div class="label">Wind Speed</div>
    <div class="value" id="speed">Loading...</div>

    <div class="label">Wind Direction</div>
    <div class="value" id="direction">Loading...</div>

    <div class="status safe" id="status">Checking...</div>

    <canvas id="windChart"></canvas>
</div>

<script>
let speedData = [];
let labels = [];

const ctx = document.getElementById('windChart').getContext('2d');

const windChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Wind Speed (km/h)',
            data: speedData,
            borderWidth: 2,
            fill: false,
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        scales: {
            x: {
                ticks: { color: "white" }
            },
            y: {
                ticks: { color: "white" }
            }
        },
        plugins: {
            legend: {
                labels: { color: "white" }
            }
        }
    }
});

async function fetchData() {
    try {
        const res = await fetch('/api/data');

        if (!res.ok) throw new Error("API error");

        const data = await res.json();

        let speed = data.speed;
        let direction = data.direction;

        document.getElementById("speed").innerText = speed + " km/h";
        document.getElementById("direction").innerText = direction + "°";

        let statusBox = document.getElementById("status");

        if (speed < 20) {
            statusBox.innerText = "SAFE";
            statusBox.className = "status safe";
        } else if (speed < 40) {
            statusBox.innerText = "WARNING";
            statusBox.className = "status warning";
        } else {
            statusBox.innerText = "DANGER";
            statusBox.className = "status danger";
        }

        let time = data.time;

        labels.push(time);
        speedData.push(speed);

        if (labels.length > 10) {
            labels.shift();
            speedData.shift();
        }

        windChart.update();

    } catch (error) {
        console.error("Fetch error:", error);
        document.getElementById("status").innerText = "Server Error";
        document.getElementById("status").className = "status danger";
    }
}

// Run immediately + every 2 sec
fetchData();
setInterval(fetchData, 2000);
</script>

</body>
</html>
